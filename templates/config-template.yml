# .adlc/config.yml — Antigravity ADLC Project Configuration
#
# Declares stack components, deployment metrics, and assistant automation limits.

project:
  name: "My Awesome App"

# Automation preferences for the Antigravity Agent
agent_automation:
  auto_create_files: true
  auto_edit_code: true
  request_review_before_git: true

stack:
  languages: ["javascript", "typescript"]
  frontends: ["web"]
  backends: ["nodejs-server"]
  databases: ["supabase"]
  ci: none

repos:
  main:
    primary: true
